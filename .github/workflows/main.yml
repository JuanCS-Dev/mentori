name: Mentori Sovereign CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run Tests
        run: npm run test -- --run

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy black
          if [ -f indexer/requirements.txt ]; then pip install -r indexer/requirements.txt; fi

      - name: Ruff Check
        run: ruff check indexer/

      - name: Mypy Check
        run: mypy indexer/ --ignore-missing-imports

      - name: Black Check
        run: black --check indexer/
