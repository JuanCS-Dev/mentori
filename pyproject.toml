[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "C90", "B"]
ignore = ["E501"] # Ignore line length for now as the crawler has many URLs

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true

[tool.black]
line-length = 120
target-version = ['py311']
